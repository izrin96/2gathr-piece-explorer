services:
  postgres:
    image: postgres:18
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=main
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5433:5432"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_NAME=main
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - DEFAULT_POOL_SIZE=20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  postgres-indexer:
    image: postgres:18
    restart: always
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=indexer
    volumes:
      - postgres-indexer-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d indexer -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer-indexer:
    image: edoburu/pgbouncer:latest
    restart: always
    depends_on:
      postgres-indexer:
        condition: service_healthy
    ports:
      - "5435:5432"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres-indexer
      - DB_NAME=indexer
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - DEFAULT_POOL_SIZE=20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  valkey:
    image: valkey/valkey:latest
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  postgres-indexer-data:
