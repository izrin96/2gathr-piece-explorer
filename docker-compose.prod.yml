# Full prod stack: website + worker + indexer (processor), and the two
# Postgres DBs they read/write behind pgbouncer, matching the pooling setup
# docker-compose.yml uses in dev.
#
# Already have managed/external Postgres instead? Delete the postgres*/
# pgbouncer* services below and point the DB env vars on website/worker/
# indexer directly at them. Note `indexer` connects directly to Postgres
# (never pgbouncer) — Subsquid runs long/DDL transactions that transaction
# pooling breaks; see AGENTS.md gotchas.
#
# Usage:
#   cp .env.prod.example .env.prod   # fill in real passwords + RPC config
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=main
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_NAME=main
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - DEFAULT_POOL_SIZE=20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  postgres-indexer:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${INDEXER_DB_PASSWORD}
      - POSTGRES_DB=indexer
    volumes:
      - postgres-indexer-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d indexer -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer-indexer:
    image: edoburu/pgbouncer:latest
    restart: always
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=${INDEXER_DB_PASSWORD}
      - DB_HOST=postgres-indexer
      - DB_NAME=indexer
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - DEFAULT_POOL_SIZE=20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  website:
    image: ghcr.io/izrin96/2gathr-piece-explorer-website:latest
    platform: linux/amd64
    restart: always
    depends_on:
      pgbouncer:
        condition: service_healthy
      pgbouncer-indexer:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@pgbouncer:5432/main
      - INDEXER_DATABASE_URL=postgres://postgres:${INDEXER_DB_PASSWORD}@pgbouncer-indexer:5432/indexer

  # Cron-scheduled TopPort enrichment + rollup recompute, plus hourly 2GATHR app-session
  # refresh + daily new-Piece-Book detection. No exposed port. Also applies pending app-DB
  # migrations on start (see MIGRATE_DATABASE_URL). The 2GATHR credential needs a one-time
  # manual seed after first boot — see IAND_BASE_URL's comment in .env.prod.example.
  worker:
    image: ghcr.io/izrin96/2gathr-piece-explorer-worker:latest
    platform: linux/amd64
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      pgbouncer-indexer:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@pgbouncer:5432/main
      # Migrations run DDL — direct to Postgres, never through pgbouncer's
      # transaction pooling (same reason indexer's DB_URL bypasses it).
      - MIGRATE_DATABASE_URL=postgres://postgres:${DB_PASSWORD}@postgres:5432/main
      - INDEXER_DATABASE_URL=postgres://postgres:${INDEXER_DB_PASSWORD}@pgbouncer-indexer:5432/indexer
      - TOPPORT_BASE_URL=${TOPPORT_BASE_URL:-https://api.topport.io}
      - IAND_BASE_URL=${IAND_BASE_URL:-https://api.iand-dev.com}

  # Subsquid processor: applies pending migrations then indexes Ruby + Piece
  # Transfer events from Titan. Connects DIRECTLY to postgres-indexer (never
  # pgbouncer-indexer) — see the note at the top of this file.
  indexer:
    image: ghcr.io/izrin96/2gathr-piece-explorer-indexer:latest
    platform: linux/amd64
    restart: always
    depends_on:
      postgres-indexer:
        condition: service_healthy
    environment:
      - DB_URL=postgres://postgres:${INDEXER_DB_PASSWORD}@postgres-indexer:5432/indexer
      - INDEXER_RPC_ENDPOINT=${INDEXER_RPC_ENDPOINT}
      - INDEXER_RPC_RATE_LIMIT=${INDEXER_RPC_RATE_LIMIT:-5}
      - INDEXER_RPC_FINALITY=${INDEXER_RPC_FINALITY:-10}
      - INDEXER_START_BLOCK=${INDEXER_START_BLOCK:-0}
      - INDEXER_GETLOGS_RANGE=${INDEXER_GETLOGS_RANGE:-2048}
      - INDEXER_RUBY_ADDRESS=${INDEXER_RUBY_ADDRESS}

volumes:
  postgres-data:
  postgres-indexer-data:
